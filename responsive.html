<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       
        *{
            box-sizing: border-box;
        }
        .container{
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            grid-template-rows: 1fr 1 fr 1fr;
            background-color: brown;
            border:blue;
            row-gap: 5px;
            
            
        }
        .box{
            background-color:2px black solid ;
            padding: 12px;
            margin: 5px;
            border: 2px solid rebeccapurple;

        }
       @media screen and (min-width: 1024px) {
            .container{
                grid-template-columns: 1fr 1fr 1fr 1fr;
                background: yellow;
            }
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
        <div class="box">11</div>
        <div class="box">12</div>
    </div>
</body>
</html>
