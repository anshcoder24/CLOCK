<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Area of triangle</h2>
    <input type="text" id="base">
    <input type="tex" id="height">
    <br>
    <button onclick="triangle()"> Calculate area of triangle</button>
    <br>
    <p id="result-triangle-area"></p>
    <hr>
    <br>
    <h2>Area of Rectangle</h2>
    <input type="text" id="length">
    <input type="text"id="width">
    <br>
    <button onclick="rectangle()"> Calculate area of rectangle</button> 
    
    <br>
    <p id="result-rectangle-area"></p>
    <hr>
    <br>
    <h2>Area of circle</h2>
    <input type="text" id="radius">
    <br>
    <button onclick="circle()">Calculate area of circle</button>
    <br>
    <p id="result-circle-area"></p>
    <hr>
    <h2>change degree celcius to fahrenhite</h2>
    <input type="text" id="conversion">
    <br>
    <button onclick="conversion()">convert celcius into fahrenhite</button>
    <br>
    <p id="result-conversion-fahrenhite"></p>

    <script>
        function rectangle(){
            let i= parseInt(document.getElementById("length").value);
            let w=parseInt(document.getElementById("width").value);
            let p=document.getElementById("result-rectangle-area");
            let area=i*w;
            p.innerHTML="Area of Rectangle="+ area;
        }
        function triangle(){
            let b= parseInt(document.getElementById("base").value);
            let h=parseInt(document.getElementById("height").value);
            let p=document.getElementById("result-triangle-area")
            let area=0.5*b*h;
            p.innerHTML="Area of trianle="+ area;
        }
        function circle(){
            let r=parseInt(document.getElementById("radius").value);
            let p=document.getElementById("result-circle-area")
            let area=3.14*r*r;
            p.innerHTML="Area of circle="+ area;
        }
        function conversion(){
            let c=parseInt(document.getElementById("conversion").value);
            let p=document.getElementById("result-conversion-fahrenhite");
            let f=(c*9/5)+32;
            p.innerHTML="fahrenhite="+ f;

        }

    </script>

</body>
</html>
