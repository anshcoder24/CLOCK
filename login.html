<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Sign Up</title>

    <style>
        *{
            margin: 0px;
            padding: 0px;

        }
        html,body{
            height: 100vh;
        }
        body{
            display: flex;
             align-items: center;
            justify-content: center;
        }
        .ig-login-container {
            
            padding: 20px;
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        button{
            padding: 10px;
           
            background-color: blue;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 10px;
            font-weight: bold;
            width: 300px;
        }

        input{
            padding:10px;
            
            background-color: rgb(235, 231, 231);
            color:red;
            border:none;
            outline: none;
            font-size:16px;
            border-radius:8px;
            font-weight: 150;
            width: 300px;

            




        }
        input::placeholder{
            color:blue;
        }
        button:hover{
            background-color: navy;
            cursor: pointer;
        }
        form{
            display: flex;
            flex-direction: column;

        }
      
    </style>
</head>
<body>
    <H1>ANIMATI0N</H1>

    <div class="ig-login-container">
        <h1 style="margin-bottom: 10px;">Instagram</h1>

        <button style="margin-bottom: 10px;" onclick="window.location.href='https://www.facebook.com'">
            Log in with Facebook
        </button>

        <p style="margin-bottom: 10px;">OR</p>

        <form>
            <input type="text" placeholder="Mobile Number or Email"><br><br>
            <input type="text" placeholder="Full Name"><br><br>
            <input type="text" placeholder="Username"><br><br>
            <input type="password" placeholder="Password"><br><br>

            <button type="submit">Sign Up</button>
        </form>
    </div>

</body>
</html>
